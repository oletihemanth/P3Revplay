<div class="auth-container">
  <div class="auth-card">
    
    <ng-container *ngIf="!showForgotPassword">
      <h2>RevPlay Login</h2>
      <p>Enter your credentials to access your music</p>

      <form (submit)="onLogin($event)">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" name="email" id="email" placeholder="Enter email" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          
          <div class="password-wrapper">
            <input [type]="showPassword ? 'text' : 'password'" name="password" id="password" placeholder="Enter password" required>
            
            <button type="button" class="toggle-password-btn" (click)="togglePasswordVisibility()" title="Toggle password visibility">
              <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
              <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
          
          <div style="text-align: right; margin-top: 5px;">
            <a href="javascript:void(0)" (click)="toggleView()" style="color: #1DB954; font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>
          </div>
        </div>

        <button type="submit" class="auth-btn">Sign In</button>
      </form>

      <div class="auth-footer">
        <p>New to RevPlay? <a routerLink="/register">Create an account</a></p>
      </div>
    </ng-container>

    <ng-container *ngIf="showForgotPassword">
      <h2>Reset Password</h2>
      <p>Enter your email and a new password.</p>

      <form (submit)="onResetPassword($event)">
        <div class="form-group">
          <label for="resetEmail">Email Address</label>
          <input type="email" name="resetEmail" id="resetEmail" placeholder="e.g., kumar@gmail.com" required>
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          
          <div class="password-wrapper">
            <input [type]="showResetPassword ? 'text' : 'password'" name="newPassword" id="newPassword" placeholder="Enter new password" required>
            
            <button type="button" class="toggle-password-btn" (click)="toggleResetPasswordVisibility()" title="Toggle password visibility">
              <svg *ngIf="!showResetPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
              <svg *ngIf="showResetPassword" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="auth-btn">Reset Password</button>
        
        <button type="button" class="auth-btn" style="background: transparent; border: 1px solid white; color: white; margin-top: 10px;" (click)="toggleView()">Back to Login</button>
      </form>
    </ng-container>

  </div>
</div>
